app = "workout-viz"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

# Secrets (set via `flyctl secrets set`, never here):
#   DB_ENCRYPTION_MASTER_KEY
[env]
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "workout_data"
  destination = "/data"
  initial_size = "3gb"
